<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp a Sheets</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    background: #f5f5f4;
    color: #2c2c2a;
  }
  h1 { font-size: 18px; font-weight: 500; }
  textarea, input, button {
    width: 100%;
    box-sizing: border-box;
    font-size: 14px;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #d3d1c7;
  }
  textarea { resize: vertical; }
  button {
    background: #3C3489;
    color: white;
    border: none;
    font-weight: 500;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; }
  #status { font-size: 13px; color: #5f5e5a; min-height: 18px; white-space: pre-wrap; margin-bottom: 8px; }
  .card {
    background: white;
    border-radius: 12px;
    border: 1px solid #d3d1c7;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  table { width: 100%; font-size: 13px; border-collapse: collapse; }
  td { padding: 4px 0; vertical-align: top; }
  td:first-child { color: #5f5e5a; padding-right: 8px; white-space: nowrap; }
  td:last-child { text-align: right; }
  details { margin-bottom: 12px; }
  summary { font-size: 13px; color: #5f5e5a; cursor: pointer; }
</style>
</head>
<body>

<h1>WhatsApp a Sheets</h1>

<details id="apiKeySection">
  <summary>Configurar API key de Anthropic</summary>
  <input type="password" id="apiKey" placeholder="sk-ant-...">
  <button id="saveKeyBtn">Guardar key</button>
</details>

<p style="font-size:14px; color:#5f5e5a;">Pega el texto de WhatsApp:</p>
<textarea id="input" rows="5" placeholder="Comercio: Ferreteria Lopez, hable con Juan, tel 11-2345-6789, direccion Av. Rivadavia 1200, usan balanza Mettler, califica para promo, email juan@lopez.com, notas: interesado en upgrade"></textarea>

<button id="processBtn">Procesar con IA</button>

<div id="status"></div>

<div class="card" id="preview">
  <table id="previewTable">
    <tbody id="previewBody"></tbody>
  </table>
</div>
<button id="sendBtn" style="display:none;">Enviar a Google Sheet</button>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbz3D7IA9mjdhibZm1fEICtTHkAMm5K4LI-MeyWaenmLt6HH8pBjhmkwWXsuvXhveKJcBg/exec";

const fields = [
  ["comercio", "Comercio"],
  ["contacto", "Con quien hable"],
  ["telefono", "Telefono"],
  ["direccion", "Direccion"],
  ["equipos", "Equipos que usa"],
  ["calificadoPromo", "Calificado para promo"],
  ["email", "Email"],
  ["notas", "Notas"]
];

let currentData = null;

const apiKeyInput = document.getElementById('apiKey');
const apiKeySection = document.getElementById('apiKeySection');
const savedKey = localStorage.getItem('anthropic_api_key');
if (savedKey) {
  apiKeyInput.value = savedKey;
  apiKeySection.removeAttribute('open');
} else {
  apiKeySection.setAttribute('open', 'true');
}

document.getElementById('saveKeyBtn').addEventListener('click', () => {
  localStorage.setItem('anthropic_api_key', apiKeyInput.value.trim());
  setStatus('API key guardada');
  apiKeySection.removeAttribute('open');
});

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? '#A32D2D' : '#5f5e5a';
}

function renderPreview(data) {
  const body = document.getElementById('previewBody');
  body.innerHTML = '';
  fields.forEach(([key, label]) => {
    const tr = document.createElement('tr');
    const td1 = document.createElement('td');
    td1.textContent = label;
    const td2 = document.createElement('td');
    td2.contentEditable = true;
    td2.dataset.key = key;
    td2.textContent = data[key] || '';
    td2.addEventListener('input', () => { currentData[key] = td2.textContent; });
    tr.appendChild(td1);
    tr.appendChild(td2);
    body.appendChild(tr);
  });
  document.getElementById('preview').style.display = 'block';
  document.getElementById('sendBtn').style.display = 'block';
}

document.getElementById('processBtn').addEventListener('click', async () => {
  const text = document.getElementById('input').value.trim();
  const apiKey = localStorage.getItem('anthropic_api_key');

  if (!text) { setStatus('Pega un texto primero', true); return; }
  if (!apiKey) { setStatus('Configura tu API key arriba primero', true); return; }

  setStatus('Procesando con IA...');
  document.getElementById('preview').style.display = 'none';
  document.getElementById('sendBtn').style.display = 'none';

  const prompt = `Extrae los siguientes datos del texto sobre un comercio. Responde SOLO con un objeto JSON valido, sin markdown ni texto adicional, con estas claves exactas: comercio, contacto, telefono, direccion, equipos, calificadoPromo, email, notas. Si un dato no esta presente, deja el valor como cadena vacia "". Para calificadoPromo responde "Si" o "No" si se menciona, o "" si no se menciona.

Texto:
${text}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error('HTTP ' + response.status + ': ' + errText);
    }

    const data = await response.json();
    let raw = data.content.map(b => b.text || '').join('');
    raw = raw.replace(/```json|```/g, '').trim();
    currentData = JSON.parse(raw);
    renderPreview(currentData);
    setStatus('Revisa los datos y envia al Sheet');
  } catch (err) {
    setStatus('Error: ' + err.message, true);
  }
});

document.getElementById('sendBtn').addEventListener('click', async function() {
  if (!currentData) return;
  this.disabled = true;
  setStatus('Enviando a Google Sheet...');

  const formData = new FormData();
  formData.append('payload', JSON.stringify(currentData));

  try {
    const resp = await fetch(SHEET_URL, {
      method: "POST",
      body: formData
    });
    setStatus('Enviado (status ' + resp.status + ')');
    document.getElementById('input').value = '';
    document.getElementById('preview').style.display = 'none';
    this.style.display = 'none';
    currentData = null;
  } catch (err) {
    setStatus('Error al enviar: ' + err.message, true);
  }
  this.disabled = false;
});
</script>

</body>
</html>
